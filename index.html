<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = 600, H = 600;
canvas.width = W; canvas.height = H;

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio() { if (!audioCtx) { try { audioCtx = new AudioCtx(); } catch(e){} } }

function playSound(freq, dur, type='square', vol=0.15) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq * 0.3, audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function playExplosion() {
  if (!audioCtx) return;
  try {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1)*(1-i/data.length);
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    src.buffer = buf; src.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.3);
    src.start();
  } catch(e) {}
}

let state = 'menu';
let score = 0, level = 1, lives = 3, hiScore = 0, frame = 0;

const player = {
  x: W/2, y: H-60, w: 40, h: 30, speed: 5,
  shootCooldown: 0, shield: false, shieldTime: 0,
  multiShot: false, multiTime: 0, rapid: false, rapidTime: 0
};

let bullets=[], enemyBullets=[], enemies=[], particles=[], powerups=[], stars=[];
let bossActive=false, boss=null;

for(let i=0;i<80;i++){
  stars.push({x:Math.random()*W, y:Math.random()*H, s:Math.random()*1.5+0.5, sp:Math.random()*0.5+0.2});
}

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  initAudio();
  if(e.code==='Space'){ e.preventDefault(); handleAction(); }
});
document.addEventListener('keyup', e => { keys[e.code]=false; });

function handleAction(){
  if(state==='menu') startGame();
  else if(state==='gameover') startGame();
  else if(state==='levelup') nextLevel();
}

// Mobile buttons
const btnLeft = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');
const btnFire = document.getElementById('btnFire');

btnLeft.addEventListener('touchstart', e=>{ e.preventDefault(); keys['ArrowLeft']=true; initAudio(); }, {passive:false});
btnLeft.addEventListener('touchend', e=>{ e.preventDefault(); keys['ArrowLeft']=false; }, {passive:false});
btnRight.addEventListener('touchstart', e=>{ e.preventDefault(); keys['ArrowRight']=true; initAudio(); }, {passive:false});
btnRight.addEventListener('touchend', e=>{ e.preventDefault(); keys['ArrowRight']=false; }, {passive:false});
btnFire.addEventListener('touchstart', e=>{ e.preventDefault(); initAudio(); if(state!=='playing') handleAction(); else keys['Space']=true; }, {passive:false});
btnFire.addEventListener('touchend', e=>{ e.preventDefault(); keys['Space']=false; }, {passive:false});

let touchX=null;
canvas.addEventListener('touchstart', e=>{
  e.preventDefault(); initAudio();
  if(state!=='playing'){ handleAction(); return; }
  touchX=(e.touches[0].clientX - canvas.getBoundingClientRect().left)*(W/canvas.getBoundingClientRect().width);
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(state!=='playing') return;
  touchX=(e.touches[0].clientX - canvas.getBoundingClientRect().left)*(W/canvas.getBoundingClientRect().width);
},{passive:false});
canvas.addEventListener('touchend', e=>{ e.preventDefault(); touchX=null; },{passive:false});

function spawnParticles(x,y,color,count=12,big=false){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=Math.random()*(big?5:3)+1;
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,color,life:1,decay:Math.random()*0.03+0.02,r:Math.random()*(big?5:3)+1});
  }
}

function makePowerup(x,y){
  if(Math.random()>0.35) return;
  const types=['shield','multi','rapid','life'];
  const colors={shield:'#00ffff',multi:'#ff00ff',rapid:'#ffff00',life:'#ff4444'};
  const t=types[Math.floor(Math.random()*types.length)];
  powerups.push({x,y,vy:1.5,type:t,color:colors[t],pulse:0,w:22,h:22});
}

function getEnemyConfig(lvl){
  const configs=[
    {rows:3,cols:8,types:['basic'],boss:false},
    {rows:3,cols:9,types:['basic','scout'],boss:false},
    {rows:4,cols:8,types:['basic','scout','scout'],boss:false},
    {rows:4,cols:9,types:['basic','scout','heavy'],boss:false},
    {rows:3,cols:8,types:['basic','scout'],boss:true},
    {rows:4,cols:9,types:['heavy','scout'],boss:false},
    {rows:4,cols:10,types:['basic','scout','heavy','elite'],boss:false},
    {rows:3,cols:8,types:['scout','elite'],boss:true},
    {rows:5,cols:10,types:['heavy','elite','elite'],boss:false},
  ];
  return configs[Math.min(lvl-1,configs.length-1)];
}

const ENEMY_TYPES={
  basic: {hp:1,pts:10,color:'#ff8c00',size:22,shootChance:0.001},
  scout: {hp:1,pts:20,color:'#ff4400',size:20,shootChance:0.002},
  heavy: {hp:3,pts:40,color:'#cc00ff',size:26,shootChance:0.0015},
  elite: {hp:2,pts:60,color:'#ff0088',size:24,shootChance:0.003},
};

function spawnEnemies(){
  enemies=[];
  const cfg=getEnemyConfig(level);
  const startX=(W-cfg.cols*55)/2+10;
  for(let r=0;r<cfg.rows;r++){
    for(let c=0;c<cfg.cols;c++){
      const typeName=cfg.types[r%cfg.types.length];
      const t=ENEMY_TYPES[typeName];
      enemies.push({
        x:startX+c*55, y:60+r*48,
        w:t.size, h:t.size,
        hp:t.hp+Math.floor(level/3),
        maxhp:t.hp+Math.floor(level/3),
        pts:t.pts*Math.ceil(level/2),
        color:t.color, type:typeName,
        shootChance:t.shootChance*(1+level*0.15),
        anim:Math.random()*Math.PI*2,
        dive:false, diveAngle:0, diveDist:0
      });
    }
  }
  bossActive=false; boss=null;
  if(cfg.boss) spawnBoss();
}

function spawnBoss(){
  bossActive=true;
  boss={
    x:W/2,y:80,w:80,h:60,
    hp:30+level*10, maxhp:30+level*10,
    vx:2,vy:0, shootTimer:0, anim:0,
    color:level>=8?'#ff0044':'#cc00ff'
  };
}

function startGame(){
  score=0; level=1; lives=3;
  player.x=W/2; player.shield=false; player.multiShot=false; player.rapid=false;
  bullets=[]; enemyBullets=[]; particles=[]; powerups=[];
  enemyDir=1; enemyMoveTimer=0; enemyDrop=false;
  spawnEnemies();
  state='playing';
}

function nextLevel(){
  level++;
  bullets=[]; enemyBullets=[]; particles=[]; powerups=[];
  enemyDir=1; enemyMoveTimer=0; enemyDrop=false;
  spawnEnemies();
  state='playing';
}

function drawHornet(x,y,size,color,anim,type){
  ctx.save();
  ctx.translate(x,y);
  ctx.translate(0,Math.sin(anim)*2);
  ctx.shadowColor=color; ctx.shadowBlur=8;
  ctx.globalAlpha=0.7;
  ctx.fillStyle=type==='elite'?'#ffaaff':'#ffffaa';
  ctx.beginPath(); ctx.ellipse(-size*0.7,-size*0.1,size*0.5,size*0.25,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(size*0.7,-size*0.1,size*0.5,size*0.25,0.3,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.ellipse(0,0,size*0.45,size*0.65,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  for(let i=-1;i<=1;i++) ctx.fillRect(-size*0.4,i*size*0.22-2,size*0.8,4);
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.arc(0,-size*0.55,size*0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff0000';
  ctx.beginPath(); ctx.arc(-size*0.12,-size*0.6,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(size*0.12,-size*0.6,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.moveTo(-4,size*0.65); ctx.lineTo(4,size*0.65); ctx.lineTo(0,size*0.9); ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();
}

function drawBoss(b){
  ctx.save(); ctx.translate(b.x,b.y);
  b.anim+=0.05;
  ctx.shadowColor=b.color; ctx.shadowBlur=20;
  ctx.globalAlpha=0.6;
  ctx.fillStyle='#ffaaff';
  ctx.beginPath(); ctx.ellipse(-b.w*0.8,0,b.w*0.6,b.h*0.3,-0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(b.w*0.8,0,b.w*0.6,b.h*0.3,0.2,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle=b.color;
  ctx.beginPath(); ctx.ellipse(0,0,b.w*0.5,b.h*0.6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  for(let i=-2;i<=2;i++) ctx.fillRect(-b.w*0.45,i*10-3,b.w*0.9,6);
  ctx.fillStyle=b.color;
  ctx.beginPath(); ctx.arc(0,-b.h*0.5,b.w*0.35,0,Math.PI*2); ctx.fill();
  ctx.shadowColor='#ff0000'; ctx.shadowBlur=15;
  ctx.fillStyle='#ff0000';
  ctx.beginPath(); ctx.arc(-12,-b.h*0.55,8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(12,-b.h*0.55,8,0,Math.PI*2); ctx.fill();
  ctx.shadowColor='#ffff00'; ctx.shadowBlur=10;
  ctx.fillStyle='#ffdd00';
  for(let i=-2;i<=2;i++){
    ctx.beginPath();
    ctx.moveTo(i*15-6,-b.h*0.7); ctx.lineTo(i*15+6,-b.h*0.7);
    ctx.lineTo(i*15,-b.h*0.9-Math.sin(b.anim+i)*5);
    ctx.closePath(); ctx.fill();
  }
  const bw=160;
  ctx.shadowBlur=0;
  ctx.fillStyle='#333'; ctx.fillRect(-bw/2,b.h*0.7,bw,10);
  ctx.fillStyle=b.hp>b.maxhp*0.5?'#00ff00':b.hp>b.maxhp*0.25?'#ffff00':'#ff0000';
  ctx.fillRect(-bw/2,b.h*0.7,bw*(b.hp/b.maxhp),10);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(-bw/2,b.h*0.7,bw,10);
  ctx.restore();
}

function drawPlayer(){
  ctx.save(); ctx.translate(player.x,player.y);
  if(player.shield){
    ctx.strokeStyle='#00ffff'; ctx.lineWidth=3;
    ctx.shadowColor='#00ffff'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.stroke();
  }
  ctx.shadowColor='#00ff88'; ctx.shadowBlur=15;
  ctx.fillStyle='#ffcc00';
  ctx.beginPath();
  ctx.moveTo(0,-20); ctx.lineTo(14,-8); ctx.lineTo(14,8);
  ctx.lineTo(0,18); ctx.lineTo(-14,8); ctx.lineTo(-14,-8);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#cc8800'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(-10,2,4,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(10,2,4,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#00ffff'; ctx.shadowColor='#00ffff'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(0,-6,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffaa00'; ctx.shadowColor='#ff8c00'; ctx.shadowBlur=5;
  ctx.beginPath(); ctx.moveTo(-14,-4); ctx.lineTo(-28,4); ctx.lineTo(-18,10); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(14,-4); ctx.lineTo(28,4); ctx.lineTo(18,10); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ff6600'; ctx.shadowColor='#ff6600'; ctx.shadowBlur=15;
  ctx.beginPath(); ctx.ellipse(0,20,8,5+Math.sin(frame*0.3)*2,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPowerup(p){
  p.pulse+=0.1;
  ctx.save(); ctx.translate(p.x,p.y);
  ctx.shadowColor=p.color; ctx.shadowBlur=15;
  const labels={shield:'SHIELD',multi:'MULTI',rapid:'RAPID',life:'+VIE'};
  ctx.strokeStyle=p.color; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,0,14+Math.sin(p.pulse)*2,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle=p.color+'44';
  ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=p.color;
  ctx.font='bold 9px Courier New'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(labels[p.type],0,0);
  ctx.restore();
}

function shootBullet(){
  const cooldown=player.rapid?6:12;
  if(player.shootCooldown>0) return;
  player.shootCooldown=cooldown;
  if(player.multiShot){
    bullets.push({x:player.x-12,y:player.y-20,vx:-0.8,vy:-10,w:4,h:14});
    bullets.push({x:player.x,y:player.y-24,vx:0,vy:-10,w:4,h:14});
    bullets.push({x:player.x+12,y:player.y-20,vx:0.8,vy:-10,w:4,h:14});
  } else {
    bullets.push({x:player.x,y:player.y-24,vx:0,vy:-10,w:4,h:14});
  }
  playSound(880,0.08,'square',0.1);
}

let enemyDir=1, enemyMoveTimer=0, enemyDrop=false;

function updateEnemies(){
  if(enemies.length===0 && !bossActive){ state='levelup'; return; }
  enemyMoveTimer++;
  const speed=Math.min(0.5+(level-1)*0.08+(1-enemies.length/50)*0.4,2.5);
  const interval=Math.max(4,16-level*1.2);

  if(enemyMoveTimer>=interval){
    enemyMoveTimer=0;
    let needDrop=false;
    if(!enemyDrop) enemies.forEach(e=>{ e.x+=18*enemyDir*speed; e.anim+=0.2; });
    if(boss && bossActive){ boss.x+=boss.vx*speed; if(boss.x<60||boss.x>W-60) boss.vx*=-1; }
    enemies.forEach(e=>{ if(e.x<15||e.x>W-15) needDrop=true; });
    if(needDrop && !enemyDrop){ enemyDir*=-1; enemies.forEach(e=>{ e.y+=20; }); enemyDrop=true; }
    else enemyDrop=false;
    enemies.forEach(e=>{
      if(!e.dive && Math.random()<0.002*level){ e.dive=true; e.diveAngle=0; e.origX=e.x; e.origY=e.y; }
    });
  }

  enemies.forEach(e=>{
    if(e.dive){
      e.diveAngle+=0.08;
      e.x=e.origX+Math.sin(e.diveAngle)*80;
      e.y=e.origY+e.diveAngle*25;
      if(e.y>H+50){ e.dive=false; e.x=e.origX; e.y=e.origY; }
    }
  });

  enemies.forEach(e=>{
    if(Math.random()<e.shootChance)
      enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:(Math.random()-0.5)*2,vy:4+level*0.3,w:4,h:10,color:e.color});
  });

  if(bossActive && boss){
    boss.anim++; boss.x+=boss.vx;
    if(boss.x<60||boss.x>W-60) boss.vx*=-1;
    boss.shootTimer++;
    const bossShootRate=Math.max(20,50-level*3);
    if(boss.shootTimer>=bossShootRate){
      boss.shootTimer=0;
      const phase=Math.floor((1-boss.hp/boss.maxhp)*3);
      const shots=phase===0?3:phase===1?5:7;
      for(let i=0;i<shots;i++){
        const angle=(Math.PI/2)+(i-(shots-1)/2)*(Math.PI/(shots*1.5));
        enemyBullets.push({x:boss.x,y:boss.y+40,vx:Math.cos(angle)*3,vy:Math.sin(angle)*4,w:6,h:12,color:boss.color});
      }
      playSound(200,0.2,'sawtooth',0.08);
    }
    if(boss.hp<=0){
      spawnParticles(boss.x,boss.y,boss.color,40,true);
      spawnParticles(boss.x,boss.y,'#ffff00',30,true);
      playExplosion();
      score+=500*level;
      bossActive=false; boss=null;
      if(enemies.length===0) state='levelup';
    }
  }

  enemies.forEach(e=>{ if(e.y+e.h>H-40) state='gameover'; });
}

function update(){
  frame++;
  if(state!=='playing') return;

  stars.forEach(s=>{ s.y+=s.sp; if(s.y>H){ s.y=0; s.x=Math.random()*W; } });

  if(touchX!==null){
    const dx=touchX-player.x;
    player.x+=dx*0.12;
  } else {
    if(keys['ArrowLeft']||keys['KeyA']) player.x=Math.max(25,player.x-player.speed);
    if(keys['ArrowRight']||keys['KeyD']) player.x=Math.min(W-25,player.x+player.speed);
  }
  if(keys['Space']||keys['ArrowUp']) shootBullet();
  if(player.shootCooldown>0) player.shootCooldown--;

  if(player.shield){ player.shieldTime--; if(player.shieldTime<=0) player.shield=false; }
  if(player.multiShot){ player.multiTime--; if(player.multiTime<=0) player.multiShot=false; }
  if(player.rapid){ player.rapidTime--; if(player.rapidTime<=0) player.rapid=false; }

  bullets=bullets.filter(b=>{ b.x+=b.vx; b.y+=b.vy; return b.y>-20; });

  enemyBullets=enemyBullets.filter(b=>{
    b.x+=b.vx; b.y+=b.vy;
    if(b.y>H+20||b.x<0||b.x>W) return false;
    if(!player.shield&&Math.abs(b.x-player.x)<18&&Math.abs(b.y-player.y)<18){
      lives--; spawnParticles(player.x,player.y,'#ff8800',20); playExplosion();
      if(lives<=0) state='gameover';
      return false;
    }
    if(player.shield&&Math.abs(b.x-player.x)<32&&Math.abs(b.y-player.y)<32){
      spawnParticles(b.x,b.y,'#00ffff',5); return false;
    }
    return true;
  });

  bullets=bullets.filter(bullet=>{
    let hit=false;
    if(bossActive&&boss){
      if(Math.abs(bullet.x-boss.x)<boss.w&&Math.abs(bullet.y-boss.y)<boss.h){
        boss.hp--; spawnParticles(bullet.x,bullet.y,boss.color,5);
        playSound(400,0.05,'square',0.05); return false;
      }
    }
    enemies=enemies.filter(e=>{
      if(!hit&&Math.abs(bullet.x-e.x)<e.w/2+2&&Math.abs(bullet.y-e.y)<e.h/2+2){
        e.hp--;
        if(e.hp<=0){
          spawnParticles(e.x,e.y,e.color,12); playExplosion();
          score+=e.pts; makePowerup(e.x,e.y); hit=true; return false;
        }
        spawnParticles(e.x,e.y,e.color,4); playSound(300,0.05,'square',0.05); hit=true; return true;
      }
      return true;
    });
    return !hit;
  });

  updateEnemies();

  powerups=powerups.filter(p=>{
    p.y+=p.vy;
    if(p.y>H+30) return false;
    if(Math.abs(p.x-player.x)<22&&Math.abs(p.y-player.y)<22){
      if(p.type==='shield'){ player.shield=true; player.shieldTime=300; }
      if(p.type==='multi'){ player.multiShot=true; player.multiTime=400; }
      if(p.type==='rapid'){ player.rapid=true; player.rapidTime=350; }
      if(p.type==='life'){ lives=Math.min(lives+1,5); }
      spawnParticles(p.x,p.y,p.color,10); playSound(660,0.2,'sine',0.15); return false;
    }
    return true;
  });

  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life-=p.decay; return p.life>0;
  });

  if(score>hiScore) hiScore=score;
}

function drawStars(){
  stars.forEach(s=>{
    ctx.globalAlpha=0.4+s.s*0.3; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.s*0.5,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawHUD(){
  document.getElementById('scoreDisplay').textContent=`SCORE: ${score}`;
  const h='❤️'.repeat(lives)+'🖤'.repeat(Math.max(0,3-lives));
  document.getElementById('livesDisplay').textContent=h;
  ctx.fillStyle='#ff8c00aa'; ctx.font='bold 13px Courier New';
  ctx.textAlign='left'; ctx.fillText(`NIVEAU ${level}`,10,H-10);
  ctx.textAlign='center'; ctx.fillText(`HI: ${hiScore}`,W/2,H-10);
  let px=W-10; ctx.textAlign='right';
  if(player.shield){ ctx.fillStyle='#00ffff'; ctx.fillText(`SHIELD ${Math.ceil(player.shieldTime/60)}s`,px,H-10); px-=90; }
  if(player.multiShot){ ctx.fillStyle='#ff00ff'; ctx.fillText(`MULTI ${Math.ceil(player.multiTime/60)}s`,px,H-10); px-=90; }
  if(player.rapid){ ctx.fillStyle='#ffff00'; ctx.fillText(`RAPID ${Math.ceil(player.rapidTime/60)}s`,px,H-10); }
}

function drawMenu(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); drawStars();
  ctx.textAlign='center';
  ctx.shadowColor='#ff8c00'; ctx.shadowBlur=30;
  ctx.fillStyle='#ffdd00'; ctx.font='bold 48px Courier New';
  ctx.fillText('FRELON',W/2,130); ctx.fillText('INVADERS',W/2,185);
  ctx.shadowColor='#ff4400'; ctx.shadowBlur=15;
  ctx.fillStyle='#ff4400'; ctx.font='bold 22px Courier New';
  ctx.fillText('★ VERSION 2 ★',W/2,225);

  ctx.save(); ctx.translate(W/2,310); ctx.scale(1.8,1.8);
  ctx.shadowColor='#ff8c00'; ctx.shadowBlur=20;
  ctx.fillStyle='#ff8c00';
  ctx.beginPath(); ctx.ellipse(0,0,18,28,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffaa00';
  ctx.beginPath(); ctx.ellipse(-25,-5,18,10,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(25,-5,18,10,0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  for(let i=-1;i<=1;i++) ctx.fillRect(-16,i*9-2,32,4);
  ctx.fillStyle='#ff8c00'; ctx.beginPath(); ctx.arc(0,-22,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff0000'; ctx.beginPath(); ctx.arc(-5,-25,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-25,3,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.shadowColor='#ffffff'; ctx.shadowBlur=10;
  ctx.fillStyle=Math.floor(frame/20)%2===0?'#ffffff':'#ffdd00';
  ctx.font='bold 18px Courier New';
  ctx.fillText('ESPACE / TAP pour commencer',W/2,430);
  ctx.fillStyle='#888'; ctx.shadowBlur=0; ctx.font='13px Courier New';
  ctx.fillText('← → bouger  |  ESPACE tirer',W/2,465);
  ctx.fillText(`MEILLEUR SCORE: ${hiScore}`,W/2,495);
  ctx.fillStyle='#ff8c00'; ctx.font='11px Courier New';
  ctx.fillText('🛡 SHIELD  ✦ MULTI-TIR  ⚡ RAPID  ❤ VIE  BOSS x2',W/2,530);
}

function drawLevelUp(){
  ctx.fillStyle='#000a'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowColor='#00ff88'; ctx.shadowBlur=30;
  ctx.fillStyle='#00ff88'; ctx.font='bold 48px Courier New';
  ctx.fillText('NIVEAU',W/2,H/2-60);
  ctx.fillText(`${level} OK!`,W/2,H/2);
  ctx.font='bold 22px Courier New'; ctx.fillStyle='#ffdd00';
  ctx.fillText(`→ NIVEAU ${level+1}`,W/2,H/2+60);
  ctx.fillStyle='#fff'; ctx.shadowBlur=5; ctx.font='16px Courier New';
  ctx.fillText('ESPACE / TAP pour continuer',W/2,H/2+110);
  ctx.fillText(`SCORE: ${score}  |  HI: ${hiScore}`,W/2,H/2+140);
}

function drawGameOver(){
  ctx.fillStyle='#000c'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowColor='#ff0000'; ctx.shadowBlur=30;
  ctx.fillStyle='#ff0000'; ctx.font='bold 52px Courier New';
  ctx.fillText('GAME',W/2,H/2-60); ctx.fillText('OVER',W/2,H/2);
  ctx.font='bold 20px Courier New'; ctx.fillStyle='#ffdd00'; ctx.shadowColor='#ffdd00';
  ctx.fillText(`SCORE FINAL: ${score}`,W/2,H/2+60);
  ctx.fillText(`RECORD: ${hiScore}`,W/2,H/2+90);
  ctx.fillStyle='#fff'; ctx.shadowBlur=5; ctx.font='16px Courier New';
  ctx.fillText('ESPACE / TAP pour rejouer',W/2,H/2+135);
}

function draw(){
  ctx.fillStyle='#050510'; ctx.fillRect(0,0,W,H);
  if(state==='menu'){ drawMenu(); return; }
  if(state==='gameover'){ drawStars(); drawGameOver(); return; }
  drawStars();
  if(state==='levelup'){ drawLevelUp(); return; }

  enemies.forEach(e=>{
    if(e.maxhp>1){
      const bw=e.w;
      ctx.fillStyle='#333'; ctx.fillRect(e.x-bw/2,e.y-e.h/2-8,bw,5);
      ctx.fillStyle='#00ff00'; ctx.fillRect(e.x-bw/2,e.y-e.h/2-8,bw*(e.hp/e.maxhp),5);
    }
    drawHornet(e.x,e.y,e.w/2,e.color,e.anim,e.type);
  });

  if(bossActive&&boss) drawBoss(boss);

  bullets.forEach(b=>{
    ctx.shadowColor='#88ffcc'; ctx.shadowBlur=8;
    ctx.fillStyle='#88ffcc'; ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
    ctx.shadowBlur=0;
  });
  enemyBullets.forEach(b=>{
    ctx.shadowColor=b.color; ctx.shadowBlur=8;
    ctx.fillStyle=b.color; ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
    ctx.shadowBlur=0;
  });

  drawPlayer();
  powerups.forEach(drawPowerup);

  particles.forEach(p=>{
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  drawHUD();
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>


</body></html>
