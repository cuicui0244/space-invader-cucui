<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#050510">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Frelon Invaders">
  <title>Frelon Invaders iPhone</title>
  <style>
    :root {
      --bg: #050510;
      --panel: #101320;
      --accent: #ff9a1f;
      --accent-2: #ff4d1c;
      --text: #ffe2b8;
      --good: #6fffd2;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: radial-gradient(circle at top, #14182b 0%, var(--bg) 55%);
      min-height: 100%;
      overscroll-behavior: none;
      touch-action: manipulation;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: var(--text);
    }
    body {
      min-height: 100svh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: calc(8px + var(--safe-top)) 10px calc(12px + var(--safe-bottom));
    }
    #gameContainer {
      width: min(100vw - 20px, 680px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #ui {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid rgba(255,154,31,.35);
      border-radius: 12px;
      background: rgba(16,19,32,.78);
      backdrop-filter: blur(8px);
      box-shadow: 0 0 0 1px rgba(255,255,255,.04) inset, 0 10px 30px rgba(0,0,0,.35);
      font-size: clamp(12px, 2.8vw, 15px);
      font-weight: 700;
      text-shadow: 0 0 8px rgba(255,154,31,.35);
    }
    #levelBadge { text-align: center; color: #ffd54a; }
    #livesDisplay { text-align: right; }
    #canvasWrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 2px solid var(--accent);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 18px rgba(255,154,31,.5), 0 0 38px rgba(255,77,28,.25);
      background: #000;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #mobileControls {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 10px;
      padding-bottom: max(6px, var(--safe-bottom));
    }
    button {
      min-height: 54px;
      border-radius: 14px;
      border: 2px solid rgba(255,154,31,.75);
      color: var(--text);
      background: linear-gradient(180deg, rgba(255,154,31,.22), rgba(255,77,28,.12));
      font: inherit;
      font-size: 22px;
      font-weight: 800;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #btnFire {
      border-color: rgba(255,77,28,.85);
      background: linear-gradient(180deg, rgba(255,77,28,.28), rgba(255,77,28,.14));
      color: #fff1d9;
      font-size: 18px;
    }
    button:active { transform: scale(.98); }
    #hint {
      font-size: 12px;
      opacity: .78;
      text-align: center;
    }
    @media (min-width: 760px) {
      body { padding: 20px; }
      #gameContainer { gap: 10px; }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="ui">
      <span id="scoreDisplay">SCORE: 0</span>
      <span id="levelBadge">FRELON INVADERS</span>
      <span id="livesDisplay">❤️❤️❤️</span>
    </div>
    <div id="canvasWrap">
      <canvas id="gameCanvas"></canvas>
    </div>
    <div id="mobileControls">
      <button id="btnLeft" aria-label="Aller à gauche">◀</button>
      <button id="btnFire" aria-label="Tirer">🐝 TIR</button>
      <button id="btnRight" aria-label="Aller à droite">▶</button>
    </div>
    <div id="hint">Touchez l'écran pour démarrer, glissez pour viser, utilisez TIR pour tirer.</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const scoreDisplay = document.getElementById('scoreDisplay');
    const livesDisplay = document.getElementById('livesDisplay');
    const levelBadge = document.getElementById('levelBadge');

    let W = 600, H = 600, scale = 1;
    function resizeGame() {
      const wrap = document.getElementById('canvasWrap');
      const size = Math.max(320, Math.floor(wrap.clientWidth));
      scale = Math.min(window.devicePixelRatio || 1, 2);
      W = size;
      H = size;
      canvas.width = Math.floor(size * scale);
      canvas.height = Math.floor(size * scale);
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      if (player) {
        player.y = H - 52;
        player.x = Math.min(Math.max(player.x, 28), W - 28);
      }
      stars = Array.from({ length: Math.max(40, Math.floor(W / 8)) }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        s: Math.random() * 1.5 + 0.5,
        sp: Math.random() * 0.5 + 0.2
      }));
      if (state === 'playing' || state === 'levelup') spawnEnemies();
    }

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) {
        try { audioCtx = new AudioCtx(); } catch (e) {}
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
    }
    function playSound(freq, dur, type = 'square', vol = 0.08) {
      if (!audioCtx) return;
      try {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = type;
        o.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        o.start();
        o.stop(audioCtx.currentTime + dur);
      } catch (e) {}
    }
    function playExplosion() { playSound(120, 0.18, 'sawtooth', 0.06); }

    let state = 'menu';
    let score = 0, level = 1, lives = 3, hiScore = 0, frame = 0;
    const player = {
      x: 300, y: 540, w: 38, h: 28, speed: 6,
      shootCooldown: 0, shield: false, shieldTime: 0,
      multiShot: false, multiTime: 0, rapid: false, rapidTime: 0
    };
    let bullets = [], enemyBullets = [], enemies = [], particles = [], powerups = [], stars = [];
    let bossActive = false, boss = null;
    let touchX = null;
    const keys = {};

    function spawnParticles(x, y, color, count = 8, big = false) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * (big ? 4.5 : 2.5) + 0.8;
        particles.push({ x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, color, life: 1, decay: Math.random() * 0.03 + 0.02, r: Math.random() * (big ? 4 : 2.5) + 1 });
      }
    }
    function makePowerup(x, y) {
      if (Math.random() > 0.28) return;
      const types = ['shield', 'multi', 'rapid', 'life'];
      const colors = { shield: '#00ffff', multi: '#ff00ff', rapid: '#ffff00', life: '#ff4444' };
      const t = types[Math.floor(Math.random() * types.length)];
      powerups.push({ x, y, vy: 1.6, type: t, color: colors[t], pulse: 0, w: 22, h: 22 });
    }

    function getEnemyConfig(lvl) {
      const configs = [
        { rows: 3, cols: 6, types: ['basic'], boss: false },
        { rows: 3, cols: 7, types: ['basic', 'scout'], boss: false },
        { rows: 4, cols: 7, types: ['basic', 'scout'], boss: false },
        { rows: 4, cols: 8, types: ['basic', 'scout', 'heavy'], boss: false },
        { rows: 3, cols: 6, types: ['basic', 'scout'], boss: true },
        { rows: 4, cols: 8, types: ['heavy', 'scout'], boss: false },
      ];
      return configs[Math.min(lvl - 1, configs.length - 1)];
    }

    const ENEMY_TYPES = {
      basic: { hp: 1, pts: 10, color: '#ff9a1f', size: 22, shootChance: 0.0009 },
      scout: { hp: 1, pts: 20, color: '#ff5a2d', size: 20, shootChance: 0.0014 },
      heavy: { hp: 3, pts: 40, color: '#cf5bff', size: 26, shootChance: 0.0012 },
      elite: { hp: 2, pts: 60, color: '#ff0088', size: 24, shootChance: 0.0022 }
    };

    let enemyDir = 1, enemyMoveTimer = 0, enemyDrop = false;
    function spawnEnemies() {
      enemies = [];
      const cfg = getEnemyConfig(level);
      const spacingX = Math.max(42, Math.min(54, Math.floor(W / (cfg.cols + 2))));
      const startX = (W - (cfg.cols - 1) * spacingX) / 2;
      for (let r = 0; r < cfg.rows; r++) {
        for (let c = 0; c < cfg.cols; c++) {
          const typeName = cfg.types[r % cfg.types.length];
          const t = ENEMY_TYPES[typeName];
          enemies.push({
            x: startX + c * spacingX,
            y: 68 + r * 44,
            w: t.size,
            h: t.size,
            hp: t.hp + Math.floor(level / 3),
            maxhp: t.hp + Math.floor(level / 3),
            pts: t.pts * Math.ceil(level / 2),
            color: t.color,
            type: typeName,
            shootChance: t.shootChance * (1 + level * 0.12),
            anim: Math.random() * Math.PI * 2,
            dive: false,
            diveAngle: 0
          });
        }
      }
      bossActive = false;
      boss = null;
      if (cfg.boss) spawnBoss();
    }

    function spawnBoss() {
      bossActive = true;
      boss = { x: W / 2, y: 88, w: 78, h: 56, hp: 26 + level * 10, maxhp: 26 + level * 10, vx: 1.7, shootTimer: 0, anim: 0, color: level >= 6 ? '#ff0044' : '#cc00ff' };
    }

    function startGame() {
      score = 0; level = 1; lives = 3;
      player.x = W / 2; player.y = H - 52;
      player.shield = false; player.multiShot = false; player.rapid = false;
      bullets = []; enemyBullets = []; particles = []; powerups = [];
      enemyDir = 1; enemyMoveTimer = 0; enemyDrop = false;
      spawnEnemies();
      state = 'playing';
    }

    function nextLevel() {
      level++;
      bullets = []; enemyBullets = []; particles = []; powerups = [];
      enemyDir = 1; enemyMoveTimer = 0; enemyDrop = false;
      spawnEnemies();
      state = 'playing';
    }

    function handleAction() {
      if (state === 'menu' || state === 'gameover') startGame();
      else if (state === 'levelup') nextLevel();
    }

    function drawHornet(x, y, size, color, anim, type) {
      ctx.save();
      ctx.translate(x, y + Math.sin(anim) * 1.8);
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.globalAlpha = 0.62;
      ctx.fillStyle = type === 'elite' ? '#ffaaff' : '#ffffaa';
      ctx.beginPath(); ctx.ellipse(-size * 0.7, -size * 0.1, size * 0.5, size * 0.25, -0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(size * 0.7, -size * 0.1, size * 0.5, size * 0.25, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.ellipse(0, 0, size * 0.45, size * 0.65, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111';
      for (let i = -1; i <= 1; i++) ctx.fillRect(-size * 0.4, i * size * 0.22 - 2, size * 0.8, 4);
      ctx.fillStyle = '#ff2e2e';
      ctx.beginPath(); ctx.arc(-size * 0.12, -size * 0.6, 3.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(size * 0.12, -size * 0.6, 3.3, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function drawBoss(b) {
      ctx.save();
      ctx.translate(b.x, b.y);
      b.anim += 0.05;
      ctx.shadowColor = b.color;
      ctx.shadowBlur = 20;
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#ffaaff';
      ctx.beginPath(); ctx.ellipse(-b.w * 0.8, 0, b.w * 0.6, b.h * 0.28, -0.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(b.w * 0.8, 0, b.w * 0.6, b.h * 0.28, 0.2, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = b.color;
      ctx.beginPath(); ctx.ellipse(0, 0, b.w * 0.5, b.h * 0.6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      for (let i = -2; i <= 2; i++) ctx.fillRect(-b.w * 0.45, i * 10 - 3, b.w * 0.9, 6);
      const bw = 150;
      ctx.fillStyle = '#333'; ctx.fillRect(-bw / 2, b.h * 0.72, bw, 8);
      ctx.fillStyle = b.hp > b.maxhp * 0.5 ? '#00ff88' : b.hp > b.maxhp * 0.25 ? '#ffe14a' : '#ff3b30';
      ctx.fillRect(-bw / 2, b.h * 0.72, bw * (b.hp / b.maxhp), 8);
      ctx.restore();
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      if (player.shield) {
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#00ffff';
        ctx.shadowBlur = 16;
        ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.moveTo(0, -19); ctx.lineTo(14, -7); ctx.lineTo(14, 8);
      ctx.lineTo(0, 18); ctx.lineTo(-14, 8); ctx.lineTo(-14, -7);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#00ffff';
      ctx.beginPath(); ctx.arc(0, -5, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff6600';
      ctx.beginPath(); ctx.ellipse(0, 20, 8, 4 + Math.sin(frame * 0.28) * 1.6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function drawPowerup(p) {
      p.pulse += 0.1;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 14;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, 13 + Math.sin(p.pulse) * 2, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }

    function shootBullet() {
      const cooldown = player.rapid ? 7 : 13;
      if (player.shootCooldown > 0) return;
      player.shootCooldown = cooldown;
      if (player.multiShot) {
        bullets.push({ x: player.x - 12, y: player.y - 20, vx: -0.8, vy: -9.5, w: 4, h: 12 });
        bullets.push({ x: player.x, y: player.y - 24, vx: 0, vy: -9.5, w: 4, h: 12 });
        bullets.push({ x: player.x + 12, y: player.y - 20, vx: 0.8, vy: -9.5, w: 4, h: 12 });
      } else {
        bullets.push({ x: player.x, y: player.y - 24, vx: 0, vy: -9.5, w: 4, h: 12 });
      }
      playSound(840, 0.06, 'square', 0.04);
    }

    function updateEnemies() {
      if (enemies.length === 0 && !bossActive) { state = 'levelup'; return; }
      enemyMoveTimer++;
      const speed = Math.min(0.45 + (level - 1) * 0.08 + (1 - enemies.length / 45) * 0.35, 2.2);
      const interval = Math.max(5, 17 - level);
      if (enemyMoveTimer >= interval) {
        enemyMoveTimer = 0;
        let needDrop = false;
        if (!enemyDrop) enemies.forEach(e => { e.x += 16 * enemyDir * speed; e.anim += 0.2; });
        enemies.forEach(e => { if (e.x < 16 || e.x > W - 16) needDrop = true; });
        if (needDrop && !enemyDrop) {
          enemyDir *= -1;
          enemies.forEach(e => { e.y += 18; });
          enemyDrop = true;
        } else enemyDrop = false;
      }
      enemies.forEach(e => {
        if (!e.dive && Math.random() < 0.0015 * level) { e.dive = true; e.diveAngle = 0; e.origX = e.x; e.origY = e.y; }
        if (e.dive) {
          e.diveAngle += 0.08;
          e.x = e.origX + Math.sin(e.diveAngle) * 70;
          e.y = e.origY + e.diveAngle * 22;
          if (e.y > H + 40) { e.dive = false; e.x = e.origX; e.y = e.origY; }
        }
        if (Math.random() < e.shootChance) enemyBullets.push({ x: e.x, y: e.y + e.h / 2, vx: (Math.random() - 0.5) * 1.8, vy: 3.8 + level * 0.28, w: 4, h: 10, color: e.color });
      });
      if (bossActive && boss) {
        boss.x += boss.vx * speed;
        if (boss.x < 60 || boss.x > W - 60) boss.vx *= -1;
        boss.shootTimer++;
        const bossShootRate = Math.max(22, 54 - level * 3);
        if (boss.shootTimer >= bossShootRate) {
          boss.shootTimer = 0;
          const phase = Math.floor((1 - boss.hp / boss.maxhp) * 3);
          const shots = phase === 0 ? 3 : phase === 1 ? 5 : 6;
          for (let i = 0; i < shots; i++) {
            const angle = (Math.PI / 2) + (i - (shots - 1) / 2) * (Math.PI / (shots * 1.6));
            enemyBullets.push({ x: boss.x, y: boss.y + 34, vx: Math.cos(angle) * 2.8, vy: Math.sin(angle) * 3.8, w: 6, h: 12, color: boss.color });
          }
          playSound(180, 0.14, 'sawtooth', 0.03);
        }
        if (boss.hp <= 0) {
          spawnParticles(boss.x, boss.y, boss.color, 28, true);
          playExplosion();
          score += 500 * level;
          bossActive = false;
          boss = null;
          if (enemies.length === 0) state = 'levelup';
        }
      }
      enemies.forEach(e => { if (e.y + e.h > H - 42) state = 'gameover'; });
    }

    function update() {
      frame++;
      if (state !== 'playing') return;
      for (const s of stars) {
        s.y += s.sp;
        if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
      }
      if (touchX !== null) {
        player.x += (touchX - player.x) * 0.18;
      } else {
        if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
        if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
      }
      player.x = Math.max(26, Math.min(W - 26, player.x));
      if (keys['Space'] || keys['ArrowUp']) shootBullet();
      if (player.shootCooldown > 0) player.shootCooldown--;
      if (player.shield && --player.shieldTime <= 0) player.shield = false;
      if (player.multiShot && --player.multiTime <= 0) player.multiShot = false;
      if (player.rapid && --player.rapidTime <= 0) player.rapid = false;

      bullets = bullets.filter(b => { b.x += b.vx; b.y += b.vy; return b.y > -20; });
      enemyBullets = enemyBullets.filter(b => {
        b.x += b.vx; b.y += b.vy;
        if (b.y > H + 20 || b.x < -10 || b.x > W + 10) return false;
        const hitPlayer = Math.abs(b.x - player.x) < 18 && Math.abs(b.y - player.y) < 18;
        const hitShield = Math.abs(b.x - player.x) < 30 && Math.abs(b.y - player.y) < 30;
        if (!player.shield && hitPlayer) {
          lives--;
          spawnParticles(player.x, player.y, '#ff8800', 16);
          playExplosion();
          if (lives <= 0) state = 'gameover';
          return false;
        }
        if (player.shield && hitShield) {
          spawnParticles(b.x, b.y, '#00ffff', 5);
          return false;
        }
        return true;
      });

      bullets = bullets.filter(bullet => {
        let hit = false;
        if (bossActive && boss && Math.abs(bullet.x - boss.x) < boss.w && Math.abs(bullet.y - boss.y) < boss.h) {
          boss.hp--;
          spawnParticles(bullet.x, bullet.y, boss.color, 5);
          playSound(360, 0.04, 'square', 0.03);
          return false;
        }
        enemies = enemies.filter(e => {
          if (!hit && Math.abs(bullet.x - e.x) < e.w / 2 + 2 && Math.abs(bullet.y - e.y) < e.h / 2 + 2) {
            e.hp--;
            if (e.hp <= 0) {
              spawnParticles(e.x, e.y, e.color, 10);
              playExplosion();
              score += e.pts;
              makePowerup(e.x, e.y);
              hit = true;
              return false;
            }
            spawnParticles(e.x, e.y, e.color, 4);
            playSound(300, 0.03, 'square', 0.02);
            hit = true;
          }
          return true;
        });
        return !hit;
      });

      updateEnemies();

      powerups = powerups.filter(p => {
        p.y += p.vy;
        if (p.y > H + 30) return false;
        if (Math.abs(p.x - player.x) < 22 && Math.abs(p.y - player.y) < 22) {
          if (p.type === 'shield') { player.shield = true; player.shieldTime = 320; }
          if (p.type === 'multi') { player.multiShot = true; player.multiTime = 380; }
          if (p.type === 'rapid') { player.rapid = true; player.rapidTime = 320; }
          if (p.type === 'life') { lives = Math.min(lives + 1, 5); }
          spawnParticles(p.x, p.y, p.color, 10);
          playSound(660, 0.12, 'sine', 0.05);
          return false;
        }
        return true;
      });

      particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life -= p.decay;
        return p.life > 0;
      });
      if (score > hiScore) hiScore = score;
    }

    function drawStars() {
      for (const s of stars) {
        ctx.globalAlpha = 0.35 + s.s * 0.25;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.s * 0.5, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawHUD() {
      scoreDisplay.textContent = `SCORE: ${score}`;
      levelBadge.textContent = `NIVEAU ${level}`;
      livesDisplay.textContent = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, 3 - lives));
    }

    function drawMenu() {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H); drawStars();
      ctx.textAlign = 'center';
      ctx.shadowColor = '#ff9a1f'; ctx.shadowBlur = 28;
      ctx.fillStyle = '#ffdd55'; ctx.font = 'bold 34px ui-monospace, monospace';
      ctx.fillText('FRELON', W / 2, H * 0.22);
      ctx.fillText('INVADERS', W / 2, H * 0.30);
      ctx.shadowBlur = 10; ctx.fillStyle = '#fff'; ctx.font = 'bold 16px ui-monospace, monospace';
      ctx.fillText('Touchez pour commencer', W / 2, H * 0.72);
      ctx.fillStyle = '#aeb7d0'; ctx.font = '13px ui-monospace, monospace';
      ctx.fillText('Glisser = bouger | TIR = tirer', W / 2, H * 0.79);
      ctx.fillText(`Record: ${hiScore}`, W / 2, H * 0.85);
    }

    function drawLevelUp() {
      ctx.fillStyle = '#000a'; ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';
      ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 24;
      ctx.fillStyle = '#00ff88'; ctx.font = 'bold 38px ui-monospace, monospace';
      ctx.fillText(`NIVEAU ${level} OK`, W / 2, H / 2 - 20);
      ctx.fillStyle = '#fff'; ctx.shadowBlur = 6; ctx.font = 'bold 16px ui-monospace, monospace';
      ctx.fillText('Touchez pour continuer', W / 2, H / 2 + 30);
    }

    function drawGameOver() {
      ctx.fillStyle = '#000c'; ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';
      ctx.shadowColor = '#ff3b30'; ctx.shadowBlur = 24;
      ctx.fillStyle = '#ff3b30'; ctx.font = 'bold 44px ui-monospace, monospace';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
      ctx.fillStyle = '#ffe14a'; ctx.font = 'bold 18px ui-monospace, monospace';
      ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 22);
      ctx.fillStyle = '#fff'; ctx.font = '16px ui-monospace, monospace';
      ctx.fillText('Touchez pour rejouer', W / 2, H / 2 + 58);
    }

    function draw() {
      ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, W, H);
      if (state === 'menu') { drawMenu(); return; }
      if (state === 'gameover') { drawStars(); drawGameOver(); return; }
      drawStars();
      if (state === 'levelup') { drawLevelUp(); return; }
      for (const e of enemies) drawHornet(e.x, e.y, e.w / 2, e.color, e.anim, e.type);
      if (bossActive && boss) drawBoss(boss);
      for (const b of bullets) { ctx.fillStyle = '#88ffcc'; ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h); }
      for (const b of enemyBullets) { ctx.fillStyle = b.color; ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h); }
      drawPlayer();
      for (const p of powerups) drawPowerup(p);
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      drawHUD();
    }

    let last = 0;
    function loop(ts) {
      if (!last || ts - last >= 1000 / 60) {
        update();
        draw();
        last = ts;
      }
      requestAnimationFrame(loop);
    }

    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      initAudio();
      if (e.code === 'Space') { e.preventDefault(); handleAction(); }
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    const btnLeft = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');
    const btnFire = document.getElementById('btnFire');
    const bindHold = (el, code) => {
      el.addEventListener('pointerdown', e => { e.preventDefault(); initAudio(); keys[code] = true; }, { passive: false });
      el.addEventListener('pointerup', e => { e.preventDefault(); keys[code] = false; }, { passive: false });
      el.addEventListener('pointercancel', () => { keys[code] = false; });
      el.addEventListener('pointerleave', () => { keys[code] = false; });
    };
    bindHold(btnLeft, 'ArrowLeft');
    bindHold(btnRight, 'ArrowRight');
    btnFire.addEventListener('pointerdown', e => {
      e.preventDefault();
      initAudio();
      if (state !== 'playing') handleAction();
      else { keys['Space'] = true; shootBullet(); }
    }, { passive: false });
    btnFire.addEventListener('pointerup', e => { e.preventDefault(); keys['Space'] = false; }, { passive: false });
    btnFire.addEventListener('pointercancel', () => { keys['Space'] = false; });

    function pointerToGameX(clientX) {
      const rect = canvas.getBoundingClientRect();
      return (clientX - rect.left) * (W / rect.width);
    }
    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      initAudio();
      if (state !== 'playing') { handleAction(); return; }
      touchX = pointerToGameX(e.clientX);
    }, { passive: false });
    canvas.addEventListener('pointermove', e => {
      if (state !== 'playing') return;
      if (e.pressure === 0 && e.pointerType !== 'touch') return;
      e.preventDefault();
      touchX = pointerToGameX(e.clientX);
    }, { passive: false });
    const clearTouch = e => { if (e) e.preventDefault(); touchX = null; };
    canvas.addEventListener('pointerup', clearTouch, { passive: false });
    canvas.addEventListener('pointercancel', clearTouch, { passive: false });

    window.addEventListener('resize', resizeGame);
    resizeGame();
    draw();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
