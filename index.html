<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="Frelon Invaders">
<title>Frelon Invaders</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:#000;overflow:hidden;
  display:flex;justify-content:center;align-items:center;
  width:100vw;height:100vh;height:100dvh;
  font-family:'Courier New',monospace;
  touch-action:none;user-select:none;
}
canvas{display:block;touch-action:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize(){
  const vw = window.innerWidth, vh = window.innerHeight;
  W = Math.min(vw, 430);
  H = vh;
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
}
resize();
window.addEventListener('resize', resize);

/* ─── AUDIO ─── */
let AC = null;
function ac(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function beep(freq, dur, type='square', vol=0.08, sweep=null){
  try{
    const a=ac(), o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type; o.frequency.value=freq;
    if(sweep) o.frequency.exponentialRampToValueAtTime(sweep, a.currentTime+dur);
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+dur);
    o.start(); o.stop(a.currentTime+dur);
  }catch(e){}
}
function sndShoot(){ beep(880,0.08,'square',0.06,220); }
function sndExplode(){ beep(180,0.35,'sawtooth',0.18,25); }
function sndHit(){ beep(440,0.25,'sine',0.12,90); }
function sndLevelUp(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.12,'square',0.08),i*100));
}
function sndBoss(){ beep(120,0.6,'sawtooth',0.15,60); }
function sndMenu(){ beep(660,0.1,'square',0.06); }

/* ─── PARTICLES ─── */
class Particle {
  constructor(x,y,col,size=3,speed=4){
    this.x=x; this.y=y; this.col=col;
    const a=Math.random()*Math.PI*2, s=Math.random()*speed+1;
    this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
    this.life=1; this.decay=Math.random()*0.035+0.015;
    this.sz=Math.random()*size+1;
    this.gravity=0.08;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=this.gravity; this.life-=this.decay; }
  draw(){
    ctx.save(); ctx.globalAlpha=Math.max(0,this.life);
    ctx.fillStyle=this.col;
    ctx.fillRect(this.x-this.sz/2, this.y-this.sz/2, this.sz, this.sz);
    ctx.restore();
  }
}

function burst(x,y,col,n=18,size=4,speed=4){
  for(let i=0;i<n;i++) G.particles.push(new Particle(x,y,col,size,speed));
}

/* ─── STARS ─── */
const STARS = Array.from({length:120},()=>({
  x:Math.random(), y:Math.random(),
  sz:Math.random()*1.8+0.3,
  spd:Math.random()*0.0004+0.0001,
  b:Math.random()
}));
function drawStars(){
  STARS.forEach(s=>{
    s.y+=s.spd;
    if(s.y>1) s.y=0;
    const blink=0.4+0.6*Math.abs(Math.sin(G.frame*0.04+s.b*10));
    ctx.fillStyle=`rgba(255,255,255,${blink*(0.3+s.sz*0.25)})`;
    ctx.fillRect(s.x*W, s.y*H, s.sz, s.sz);
  });
}

/* ─── DIFFICULTIES ─── */
const DIFFS = {
  facile: { label:'FACILE 🌸', col:'#2ecc71', enmSpd:0.6, enmFire:0.0006, plrSpd:4.5, fireRate:10, bltSpd:9, enmBltSpd:2.8, lives:5, mult:1 },
  normal: { label:'NORMAL ⚡', col:'#f39c12', enmSpd:1.1, enmFire:0.0012, plrSpd:5, fireRate:7, bltSpd:11, enmBltSpd:3.8, lives:3, mult:2 },
  difficile:{ label:'DIFFICILE 🔥', col:'#e74c3c', enmSpd:1.8, enmFire:0.002, plrSpd:5.5, fireRate:5, bltSpd:13, enmBltSpd:5, lives:2, mult:4 },
  insane: { label:'☠ INSANE', col:'#9b59b6', enmSpd:2.8, enmFire:0.004, plrSpd:6.5, fireRate:3, bltSpd:15, enmBltSpd:7, lives:1, mult:8 }
};
const DKEYS = Object.keys(DIFFS);

/* ─── GAME STATE ─── */
const G = {
  state:'menu', diff:null, dk:null,
  score:0, hi:+localStorage.getItem('frelonHi')||0,
  hiByDiff:{
    facile: +localStorage.getItem('frelonHi_facile')||0,
    normal: +localStorage.getItem('frelonHi_normal')||0,
    difficile: +localStorage.getItem('frelonHi_difficile')||0,
    insane: +localStorage.getItem('frelonHi_insane')||0,
  },
  level:1, lives:3,
  particles:[], shake:0, frame:0,
  menuSel:0, menuPage:'main',
  player:null, bullets:[], enmBullets:[],
  enemies:[], shields:[], boss:null,
  enmDir:1, fireTimer:0,
  lvlFlash:0,
  keys:{}, touchL:false, touchR:false, touchX:null, paused:false,
  combo:0, lastKill:0,
  savedGame:null,
  btns:{}
};

/* ─── INPUT ─── */
window.addEventListener('keydown',e=>{
  G.keys[e.key]=true;
  if(G.state==='menu'){
    if(e.key==='ArrowUp'||e.key==='w') { G.menuSel=(G.menuSel-1+DKEYS.length)%DKEYS.length; sndMenu(); }
    if(e.key==='ArrowDown'||e.key==='s') { G.menuSel=(G.menuSel+1)%DKEYS.length; sndMenu(); }
    if(e.key===' '||e.key==='Enter') startGame(DKEYS[G.menuSel]);
  }
  if((G.state==='gameover'||G.state==='win')&&(e.key===' '||e.key==='Enter')) G.state='menu';
});
window.addEventListener('keyup',e=>{ G.keys[e.key]=false; });

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const tx=(e.touches[0].clientX-rect.left)*(W/rect.width);
  const ty=(e.touches[0].clientY-rect.top)*(H/rect.height);

  if(G.state==='menu'){ handleMenuTouch(tx,ty); return; }
  if(G.state==='gameover'||G.state==='win'){ G.state='menu'; return; }
  if(G.state==='playing'&&G.paused){
    // Check pause buttons
    if(hitBtn('continuer',tx,ty)){ G.paused=false; return; }
    if(hitBtn('sortir',tx,ty)){
      // Save snapshot to resume later
      G.savedGame={ dk:G.dk, score:G.score, level:G.level, lives:G.lives,
        player:{...G.player,trail:[]},
        enemies:G.enemies.map(e=>({...e})),
        shields:G.shields.map(s=>({...s})),
        bullets:[...G.bullets], enmBullets:[...G.enmBullets],
        boss:G.boss?{...G.boss}:null,
        enmDir:G.enmDir, fireTimer:G.fireTimer, lvlFlash:0, combo:G.combo
      };
      G.state='menu'; G.paused=false; G.menuPage='main';
      return;
    }
    return;
  }
  handleTouch(e);
},{passive:false});
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); if(!G.paused) handleTouch(e); },{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  G.touchL=false; G.touchR=false; G.touchX=null;
  if(G.state==='playing') G.paused=true;
},{passive:false});

function handleTouch(e){
  if(G.state!=='playing') return;
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width;
  G.touchL=false; G.touchR=false; G.touchX=null;
  for(const t of e.touches){
    const tx=(t.clientX-rect.left)*scaleX;
    G.touchX=tx;
    if(tx<W/2) G.touchL=true; else G.touchR=true;
  }
}
function hitBtn(name,tx,ty){
  const b=G.btns[name];
  return b&&tx>=b.x&&tx<=b.x+b.w&&ty>=b.y&&ty<=b.y+b.h;
}

function handleMenuTouch(tx,ty){
  if(G.menuPage==='scores'){ G.menuPage='main'; return; }
  if(hitBtn('reprendre',tx,ty)&&G.savedGame){ resumeGame(); return; }
  if(hitBtn('scores',tx,ty)){ G.menuPage='scores'; sndMenu(); return; }
  const base=H*0.5;
  for(let i=0;i<DKEYS.length;i++){
    const by=base+i*56;
    if(ty>=by&&ty<=by+46){ startGame(DKEYS[i]); return; }
  }
}

function resumeGame(){
  const s=G.savedGame;
  if(!s) return;
  G.dk=s.dk; G.diff=DIFFS[s.dk];
  G.score=s.score; G.level=s.level; G.lives=s.lives;
  G.player=s.player; G.enemies=s.enemies; G.shields=s.shields;
  G.bullets=s.bullets; G.enmBullets=s.enmBullets;
  G.boss=s.boss; G.enmDir=s.enmDir; G.fireTimer=s.fireTimer;
  G.lvlFlash=0; G.combo=s.combo; G.particles=[];
  G.state='playing'; G.paused=false;
  sndMenu();
}

function saveHiScore(){
  if(G.score>G.hi){ G.hi=G.score; localStorage.setItem('frelonHi',G.hi); }
  if(G.dk&&G.score>G.hiByDiff[G.dk]){
    G.hiByDiff[G.dk]=G.score;
    localStorage.setItem('frelonHi_'+G.dk, G.score);
  }
}
function startGame(dk){
  G.dk=dk; G.diff=DIFFS[dk];
  G.score=0; G.level=1; G.lives=G.diff.lives;
  G.particles=[]; G.shake=0; G.bullets=[]; G.enmBullets=[]; G.boss=null;
  G.state='playing'; G.lvlFlash=0; G.combo=0;
  initPlayer(); initEnemies(); initShields();
  sndMenu();
}

function initPlayer(){
  G.player={ x:W/2, y:H-190, w:42, h:28, inv:0, trail:[] };
  G.fireTimer=0;
}

function initEnemies(){
  G.enemies=[]; G.enmDir=1;
  const boss=(G.level%5===0);
  G.boss=null;
  if(boss){
    G.boss={
      x:W/2, y:90, w:90, h:55,
      hp:15+G.level*3, maxHp:15+G.level*3,
      dir:1, spd:1.2+G.level*0.12,
      ft:0, phase:0, anim:0
    };
    return;
  }
  const cols=Math.min(8+Math.floor(G.level/3),10);
  const rows=Math.min(3+Math.floor(G.level/2),6);
  const marginX=30;
  const spacingX=(W-marginX*2)/cols;
  for(let r=0;r<rows;r++){
    const type=r===0?'queen':r<3?'soldier':'worker';
    for(let c=0;c<cols;c++){
      G.enemies.push({
        x:marginX+c*spacingX+spacingX/2,
        y:60+r*44,
        w:28, h:20,
        alive:true, anim:0, at:0, type,
        hp: type==='queen'?3:type==='soldier'?2:1
      });
    }
  }
}

function initShields(){
  G.shields=[];
  if(G.level>4) return;
  const n=3;
  for(let i=0;i<n;i++){
    const sx=(W/(n+1))*(i+1)-28;
    const sy=G.player.y-70;
    for(let bx=0;bx<6;bx++) for(let by=0;by<4;by++)
      G.shields.push({x:sx+bx*10,y:sy+by*10,w:10,h:10,hp:4,alive:true});
  }
}

/* ─── DRAWING HELPERS ─── */
function drawRoundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawShip(x,y,w,h){
  ctx.beginPath();
  ctx.moveTo(x,y-h/2);
  ctx.lineTo(x+w/2,y+h/2);
  ctx.lineTo(x+w/4,y+h/3);
  ctx.lineTo(x-w/4,y+h/3);
  ctx.lineTo(x-w/2,y+h/2);
  ctx.closePath();
}

function drawEnemy(e){
  if(!e.alive) return;
  const {x,y,anim:a,type}=e;
  if(type==='worker'){
    ctx.fillStyle='#f5a623';
    ctx.beginPath(); ctx.ellipse(x,y,13,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(x-10,y-2,20,4); ctx.fillRect(x-8,y+2,16,3);
    ctx.fillStyle='rgba(200,230,255,0.75)';
    ctx.beginPath(); ctx.ellipse(x-(a?14:17),y-4,9,4.5,-0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+(a?14:17),y-4,9,4.5,0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e74c3c';
    ctx.fillRect(x-5,y-6,3,3); ctx.fillRect(x+2,y-6,3,3);
    ctx.fillStyle='#e67e22';
    ctx.beginPath(); ctx.moveTo(x,y+9); ctx.lineTo(x-3,y+6); ctx.lineTo(x+3,y+6); ctx.closePath(); ctx.fill();
  } else if(type==='soldier'){
    ctx.fillStyle='#e74c3c';
    ctx.beginPath(); ctx.ellipse(x,y,15,10,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a1a2e';
    for(let i=0;i<3;i++) ctx.fillRect(x-11+i*8,y-2,5,4);
    ctx.fillStyle='rgba(200,230,255,0.75)';
    ctx.beginPath(); ctx.ellipse(x-(a?17:20),y-5,11,5.5,-0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+(a?17:20),y-5,11,5.5,0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f39c12';
    ctx.fillRect(x-6,y-9,4,4); ctx.fillRect(x+2,y-9,4,4);
    ctx.fillStyle='#e74c3c';
    ctx.beginPath(); ctx.moveTo(x,y+11); ctx.lineTo(x-4,y+7); ctx.lineTo(x+4,y+7); ctx.closePath(); ctx.fill();
  } else {
    ctx.fillStyle='#9b59b6';
    ctx.beginPath(); ctx.ellipse(x,y,17,11,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f5a623';
    ctx.fillRect(x-9,y-3,18,3); ctx.fillRect(x-7,y+1,14,3);
    ctx.fillStyle='rgba(200,230,255,0.8)';
    ctx.beginPath(); ctx.ellipse(x-(a?19:22),y-5,13,6,-0.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+(a?19:22),y-5,13,6,0.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f1c40f';
    ctx.beginPath();
    [-8,-4,0,4,8].forEach(dx=>{ ctx.moveTo(x+dx,y-11); ctx.lineTo(x+dx+4,y-11); ctx.lineTo(x+dx+2,y-17); });
    ctx.fill();
    ctx.fillStyle='#e74c3c';
    ctx.fillRect(x-5,y-7,3,4); ctx.fillRect(x+2,y-7,3,4);
  }
  // Flash when hit
  if(e.flashTimer>0){
    ctx.save(); ctx.globalAlpha=e.flashTimer/8;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(x,y,17,11,0,0,Math.PI*2); ctx.fill();
    ctx.restore(); e.flashTimer--;
  }
}

function drawBoss(){
  const b=G.boss; if(!b) return;
  const {x,y}=b;
  const pulse=0.92+0.08*Math.sin(G.frame*0.15);
  const hpRatio=b.hp/b.maxHp;

  // Glow aura
  ctx.save();
  const col=hpRatio>0.5?'#9b59b6':hpRatio>0.25?'#e74c3c':'#e74c3c';
  ctx.shadowColor=col; ctx.shadowBlur=30*pulse;
  ctx.globalAlpha=0.15*pulse;
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(x,y,90,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.save(); ctx.translate(x,y); ctx.scale(pulse,pulse); ctx.translate(-x,-y);

  // Body
  ctx.fillStyle=hpRatio>0.5?'#9b59b6':hpRatio>0.25?'#c0392b':'#922b21';
  ctx.beginPath(); ctx.ellipse(x,y,58,36,0,0,Math.PI*2); ctx.fill();

  // Stripes
  ctx.fillStyle='#f5a623';
  for(let i=-3;i<=3;i++){ if(Math.abs(i)%2===0) ctx.fillRect(x-42+i*12+3,y-12,9,24); }

  // Wings
  [[x-68,y-10,-0.5,32,15],[x+68,y-10,0.5,32,15],[x-58,y+12,-0.3,22,10],[x+58,y+12,0.3,22,10]].forEach(([wx,wy,ang,rx,ry])=>{
    ctx.fillStyle='rgba(200,230,255,0.65)';
    ctx.beginPath(); ctx.ellipse(wx,wy,rx,ry,ang,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(150,200,255,0.4)'; ctx.lineWidth=1; ctx.stroke();
  });

  // Eyes
  [[x-20,y-8],[x+20,y-8]].forEach(([ex,ey])=>{
    ctx.fillStyle='#e74c3c';
    ctx.beginPath(); ctx.arc(ex,ey,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(ex+2,ey-2,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a1a2e';
    ctx.beginPath(); ctx.arc(ex+2,ey-2,1.5,0,Math.PI*2); ctx.fill();
  });

  // Crown
  ctx.fillStyle='#f1c40f';
  for(let i=0;i<5;i++){
    const cx=x-40+i*20;
    ctx.beginPath(); ctx.moveTo(cx,y-37); ctx.lineTo(cx+10,y-37); ctx.lineTo(cx+5,y-48); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#e74c3c';
    ctx.beginPath(); ctx.arc(cx+5,y-48,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f1c40f';
  }

  // Stinger
  ctx.fillStyle='#e67e22';
  ctx.beginPath(); ctx.moveTo(x,y+40); ctx.lineTo(x-8,y+36); ctx.lineTo(x+8,y+36); ctx.closePath(); ctx.fill();

  ctx.restore();

  // HP bar
  const bw=Math.min(W-40,180), bx=x-bw/2, bby=y-65;
  ctx.fillStyle='rgba(0,0,0,0.6)'; drawRoundRect(bx-2,bby-2,bw+4,14,4); ctx.fill();
  const hcol=hpRatio>0.5?'#9b59b6':hpRatio>0.25?'#e74c3c':'#c0392b';
  ctx.fillStyle=hcol; drawRoundRect(bx,bby,bw*hpRatio,10,3); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; drawRoundRect(bx,bby,bw,10,3); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
  ctx.fillText(`👑 REINE — ${b.hp}/${b.maxHp}`,x,bby-5);

  // Phase 2 warning
  if(hpRatio<0.5&&Math.floor(G.frame/15)%2===0){
    ctx.fillStyle='#e74c3c'; ctx.font='bold 11px monospace';
    ctx.fillText('⚠ PHASE 2',x,bby+24);
  }
}

/* ─── UPDATE ─── */
function update(){
  if(G.state!=='playing'||G.paused) return;
  G.frame++;
  if(G.lvlFlash>0){ G.lvlFlash--; return; }
  if(G.shake>0) G.shake*=0.85;

  const d=G.diff, p=G.player;

  // Player move — suit le doigt directement avec amortissement
  const movL=(G.keys['ArrowLeft']||G.keys['a']||G.touchL);
  const movR=(G.keys['ArrowRight']||G.keys['d']||G.touchR);
  if(G.touchX!==null){
    // Suivi direct du doigt avec légère inertie
    const diff=G.touchX-p.x;
    const move=diff*0.18;
    if(Math.abs(move)>0.3) p.x+=move;
    p.x=Math.max(p.w/2, Math.min(W-p.w/2, p.x));
    if(Math.abs(move)>1) p.trail.push({x:p.x,y:p.y,l:1});
  } else {
    if(movL&&p.x>p.w/2){ p.x-=d.plrSpd*1.4; p.trail.push({x:p.x,y:p.y,l:1}); }
    if(movR&&p.x<W-p.w/2){ p.x+=d.plrSpd*1.4; p.trail.push({x:p.x,y:p.y,l:1}); }
  }
  p.trail=p.trail.filter(t=>{ t.l-=0.12; return t.l>0; });
  if(p.inv>0) p.inv--;

  // Auto fire
  G.fireTimer++;
  if(G.fireTimer>=d.fireRate){
    G.fireTimer=0;
    G.bullets.push({x:p.x,y:p.y-p.h/2,w:4,h:14,spd:d.bltSpd});
    sndShoot();
  }

  // Bullets
  G.bullets=G.bullets.filter(b=>{ b.y-=b.spd; return b.y>-20; });
  G.enmBullets=G.enmBullets.filter(b=>{ b.x+=(b.vx||0); b.y+=b.spd; return b.y<H+20; });

  // Shields vs bullets
  [...G.bullets,...G.enmBullets].forEach(b=>{
    G.shields.forEach(s=>{
      if(!s.alive) return;
      if(b.x>=s.x&&b.x<=s.x+s.w&&b.y>=s.y&&b.y<=s.y+s.h){
        s.hp--; if(s.hp<=0) s.alive=false;
        b.y=-999; b.x=-999;
        burst(s.x+5,s.y+5,'#27ae60',5,3,2);
      }
    });
  });

  if(!G.boss){
    // ── ENEMIES ──
    const alive=G.enemies.filter(e=>e.alive);
    if(alive.length===0){ nextLevel(); return; }

    const speedBoost=1+(1-alive.length/Math.max(1,G.enemies.length))*2.5;
    const spd=d.enmSpd*speedBoost*(1+G.level*0.08);

    let hitEdge=false;
    alive.forEach(e=>{
      e.x+=G.enmDir*spd;
      e.at++; if(e.at>28){ e.anim^=1; e.at=0; }
    });

    const lx=Math.min(...alive.map(e=>e.x-e.w/2));
    const rx=Math.max(...alive.map(e=>e.x+e.w/2));
    if(rx>=W-4||lx<=4){ G.enmDir*=-1; alive.forEach(e=>e.y+=18); }

    // Enemy fire
    if(alive.length&&Math.random()<d.enmFire*alive.length){
      const sh=alive[Math.floor(Math.random()*alive.length)];
      G.enmBullets.push({x:sh.x,y:sh.y+sh.h/2,w:4,h:10,spd:d.enmBltSpd});
    }

    // Enemy reach bottom
    if(Math.max(...alive.map(e=>e.y+e.h/2))>=p.y-25){ gameOver(); return; }

    // Bullets hit enemies
    G.bullets.forEach(b=>{
      G.enemies.forEach(e=>{
        if(!e.alive||b.y<-10) return;
        if(Math.abs(b.x-e.x)<e.w/2+2&&Math.abs(b.y-e.y)<e.h/2+2){
          e.hp--;
          b.y=-999;
          if(e.hp<=0){
            e.alive=false;
            const now=Date.now();
            if(now-G.lastKill<1500) G.combo++; else G.combo=1;
            G.lastKill=now;
            const pts=(e.type==='queen'?30:e.type==='soldier'?20:10)*d.mult;
            const comboBonus=G.combo>3?G.combo:1;
            G.score+=pts*comboBonus;
            saveHiScore();
            const col=e.type==='queen'?'#9b59b6':e.type==='soldier'?'#e74c3c':'#f5a623';
            burst(e.x,e.y,col,18,4,5); sndExplode(); G.shake=6;
            if(G.combo>3) burst(e.x,e.y,'#f1c40f',8,3,3);
          } else {
            e.flashTimer=8;
            burst(e.x,e.y,'#fff',6,2,3);
          }
        }
      });
    });
  } else {
    // ── BOSS ──
    const b=G.boss;
    b.x+=b.dir*b.spd;
    if(b.x>W-b.w/2||b.x<b.w/2) b.dir*=-1;
    b.anim++; if(b.anim>20){ b.anim=0; }

    // Phase 2 rage
    const phase2=b.hp/b.maxHp<0.5;
    const fi=Math.max(15, (phase2?25:50)-G.level*1.5);
    b.ft++;
    if(b.ft>=fi){
      b.ft=0;
      const angles=phase2?[-0.4,-0.2,0,0.2,0.4]:[-0.3,0,0.3];
      angles.forEach(a=>{
        G.enmBullets.push({
          x:b.x, y:b.y+b.h/2+5,
          w:phase2?7:5, h:14,
          spd:d.enmBltSpd*(phase2?1.5:1.2),
          vx:Math.sin(a)*(d.enmBltSpd*(phase2?1.5:1.2)),
          col: phase2?'#e74c3c':'#9b59b6'
        });
      });
    }

    // Bullets hit boss
    G.bullets.forEach(blt=>{
      if(blt.y<-10) return;
      if(Math.abs(blt.x-b.x)<b.w/2&&Math.abs(blt.y-b.y)<b.h/2){
        b.hp--; blt.y=-999;
        burst(blt.x,blt.y,'#9b59b6',7,3,4); G.shake=4;
        if(b.hp<=0){
          G.score+=600*d.mult;
          saveHiScore();
          burst(b.x,b.y,'#9b59b6',60,6,7);
          burst(b.x,b.y,'#f1c40f',30,4,6);
          sndBoss(); G.boss=null;
          nextLevel();
        }
      }
    });
  }

  // Enemy bullets hit player
  if(p.inv<=0){
    G.enmBullets.forEach(b=>{
      if(b.y<-10) return;
      if(Math.abs(b.x-p.x)<p.w/2&&Math.abs(b.y-p.y)<p.h/2){
        b.y=-999; G.lives--; p.inv=130;
        G.shake=18; burst(p.x,p.y,'#e74c3c',25,5,5); sndHit();
        if(G.lives<=0) gameOver();
      }
    });
  }

  G.particles=G.particles.filter(pt=>{ pt.update(); return pt.life>0; });
}

function nextLevel(){
  G.level++;
  G.lvlFlash=150;
  burst(W/2,H/2,'#f5a623',50,6,8);
  burst(W/2,H/2,'#fff',20,3,5);
  sndLevelUp();
  setTimeout(()=>{
    G.bullets=[]; G.enmBullets=[];
    initEnemies(); initShields();
  },50);
}

function gameOver(){
  G.state='gameover';
  burst(G.player.x,G.player.y,'#e74c3c',40,6,6);
  burst(G.player.x,G.player.y,'#f5a623',20,4,5);
  sndExplode();
}

/* ─── DRAW ─── */
function draw(){
  ctx.save();
  if(G.shake>0.3){
    ctx.translate((Math.random()-0.5)*G.shake,(Math.random()-0.5)*G.shake);
  }

  if(G.state==='menu'){ drawMenu(); }
  else if(G.state==='playing'){ drawGame(); }
  else if(G.state==='gameover'){ drawGameOver(); }

  ctx.restore();
}

function drawGame(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  drawStars();

  // Ground line
  ctx.strokeStyle='rgba(52,152,219,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,G.player.y+G.player.h/2+8); ctx.lineTo(W,G.player.y+G.player.h/2+8); ctx.stroke();

  // Shields
  G.shields.forEach(s=>{
    if(!s.alive) return;
    ctx.fillStyle=`rgba(39,174,96,${s.hp/4})`;
    ctx.fillRect(s.x,s.y,s.w,s.h);
  });

  // Enemies
  G.enemies.forEach(e=>drawEnemy(e));
  drawBoss();

  // Bullets
  G.bullets.forEach(b=>{
    if(b.y<-20) return;
    const g=ctx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
    g.addColorStop(0,'#fff'); g.addColorStop(0.4,'#3498db'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(b.x-b.w/2,b.y,b.w,b.h);
    ctx.save(); ctx.globalAlpha=0.25; ctx.fillStyle='#3498db';
    ctx.fillRect(b.x-b.w,b.y,b.w*2,b.h); ctx.restore();
  });
  G.enmBullets.forEach(b=>{
    if(b.y>H+20) return;
    const col=b.col||'#e74c3c';
    const g=ctx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
    g.addColorStop(0,'transparent'); g.addColorStop(0.6,col); g.addColorStop(1,'#fff');
    ctx.fillStyle=g; ctx.fillRect(b.x-b.w/2,b.y,b.w,b.h);
    ctx.save(); ctx.globalAlpha=0.25; ctx.fillStyle=col;
    ctx.fillRect(b.x-b.w,b.y,b.w*2,b.h); ctx.restore();
  });

  // Particles
  G.particles.forEach(p=>p.draw());

  // Player
  const p=G.player;
  if(!(p.inv>0&&Math.floor(p.inv/5)%2===0)){
    // Trail
    p.trail.forEach(t=>{
      ctx.save(); ctx.globalAlpha=t.l*0.25;
      ctx.fillStyle='#3498db'; drawShip(t.x,t.y,p.w,p.h); ctx.fill(); ctx.restore();
    });
    // Engine
    ctx.save(); ctx.globalAlpha=0.45+0.3*Math.sin(G.frame*0.25);
    ctx.fillStyle='#3498db';
    ctx.fillRect(p.x-5,p.y+p.h/2,10,8+4*Math.random());
    ctx.globalAlpha=0.2;
    ctx.fillRect(p.x-10,p.y+p.h/2,20,6);
    ctx.restore();
    // Body
    ctx.fillStyle='#3498db'; drawShip(p.x,p.y,p.w,p.h); ctx.fill();
    ctx.fillStyle='#c8e6ff'; ctx.beginPath(); ctx.ellipse(p.x,p.y-2,7,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2980b9';
    ctx.fillRect(p.x-p.w/2,p.y-4,8,12); ctx.fillRect(p.x+p.w/2-8,p.y-4,8,12);
  }

  // HUD
  drawHUD();

  // Pause overlay
  if(G.paused){
    ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.shadowColor='#f5a623'; ctx.shadowBlur=30;
    ctx.fillStyle='#f5a623'; ctx.font='bold 44px monospace'; ctx.textAlign='center';
    ctx.fillText('PAUSE',W/2,H*0.3);
    ctx.restore();

    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='15px monospace'; ctx.textAlign='center';
    ctx.fillText(`Score : ${G.score}`,W/2,H*0.3+40);
    ctx.fillStyle=G.diff.col; ctx.font='13px monospace';
    ctx.fillText(`Niveau ${G.level}  •  ${G.diff.label}`,W/2,H*0.3+64);

    // Continuer button
    const bw=200, bh=50, bx=W/2-bw/2;
    const by1=H*0.3+100;
    G.btns.continuer={x:bx,y:by1,w:bw,h:bh};
    ctx.fillStyle='rgba(52,152,219,0.25)'; ctx.strokeStyle='#3498db'; ctx.lineWidth=2;
    drawRoundRect(bx,by1,bw,bh,12); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#3498db'; ctx.font='bold 17px monospace'; ctx.textAlign='center';
    ctx.fillText('▶  Continuer',W/2,by1+32);

    // Sortir button
    const by2=by1+70;
    G.btns.sortir={x:bx,y:by2,w:bw,h:bh};
    ctx.fillStyle='rgba(231,76,60,0.2)'; ctx.strokeStyle='#e74c3c'; ctx.lineWidth=2;
    drawRoundRect(bx,by2,bw,bh,12); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#e74c3c'; ctx.font='bold 17px monospace';
    ctx.fillText('✕  Sortir',W/2,by2+32);
  }
}

function drawHUD(){
  // Top strip
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,38);
  ctx.fillStyle='#fff'; ctx.font='bold 13px monospace';
  ctx.textAlign='left'; ctx.fillText(`${G.score}`,8,26);
  ctx.textAlign='center'; ctx.fillStyle=G.diff.col;
  ctx.fillText(`NIV ${G.level}`,W/2,26);
  ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText(`HI ${G.hi}`,W-8,26);

  // Lives
  for(let i=0;i<G.lives;i++){
    ctx.fillStyle='#3498db';
    ctx.save(); ctx.translate(10+i*18,H-20);
    drawShip(0,0,14,10); ctx.fill(); ctx.restore();
  }

  // Title blinking
  if(Math.floor(G.frame/20)%2===0){
    ctx.fillStyle='rgba(245,166,35,0.7)'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
    ctx.fillText('FRELON INVADER',W/2,H-18);
    ctx.fillStyle='rgba(200,230,255,0.55)'; ctx.font='10px monospace';
    ctx.fillText('by cuicui',W/2,H-5);
  }

  // Combo
  if(G.combo>3&&Date.now()-G.lastKill<1500){
    ctx.save();
    ctx.globalAlpha=Math.min(1,(Date.now()-G.lastKill<1000)?1:(1500-(Date.now()-G.lastKill))/500);
    ctx.fillStyle='#f1c40f'; ctx.font='bold 16px monospace'; ctx.textAlign='center';
    ctx.fillText(`COMBO x${G.combo} 🔥`,W/2,H-45);
    ctx.restore();
  }

  // Touch hint (first 3s)
  if(G.frame<160){
    ctx.save(); ctx.globalAlpha=Math.max(0,(160-G.frame)/80)*0.18;
    ctx.fillStyle='#3498db'; ctx.fillRect(0,H/2,W/2,H/2);
    ctx.fillStyle='#e74c3c'; ctx.fillRect(W/2,H/2,W/2,H/2);
    ctx.globalAlpha=Math.max(0,(160-G.frame)/80)*0.6;
    ctx.fillStyle='#fff'; ctx.font='28px monospace'; ctx.textAlign='center';
    ctx.fillText('◀',W/4,H*0.78); ctx.fillText('▶',W*3/4,H*0.78);
    ctx.restore();
  }

  // Level flash
  if(G.lvlFlash>0){
    const a=Math.min(1,G.lvlFlash/40);
    ctx.save(); ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle=G.diff.col; ctx.font='bold 30px monospace'; ctx.textAlign='center';
    ctx.fillText(`NIVEAU ${G.level-1}`,W/2,H/2-18);
    ctx.fillStyle='#fff'; ctx.font='18px monospace';
    ctx.fillText('ACCOMPLI !',W/2,H/2+22);
    if(G.level%5===0&&G.lvlFlash>30){
      ctx.fillStyle='#9b59b6'; ctx.font='bold 15px monospace';
      ctx.fillText('⚠ BOSS INCOMING ⚠',W/2,H/2+58);
    }
    ctx.restore();
  }
}

function drawMenu(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  drawStars();

  if(G.menuPage==='scores'){ drawScores(); return; }

  // Title
  ctx.save();
  ctx.shadowColor='#f5a623'; ctx.shadowBlur=30;
  ctx.fillStyle='#f5a623'; ctx.font='bold 36px monospace'; ctx.textAlign='center';
  ctx.fillText('FRELON',W/2,H*0.12);
  ctx.shadowColor='#fff'; ctx.shadowBlur=10;
  ctx.fillStyle='#fff'; ctx.font='bold 22px monospace';
  ctx.fillText('INVADERS',W/2,H*0.12+38);
  ctx.fillStyle='rgba(200,230,255,0.7)'; ctx.font='12px monospace'; ctx.shadowBlur=0;
  ctx.fillText('by cuicui',W/2,H*0.12+58);
  ctx.restore();

  // Mascot
  const fy=H*0.12+58+60+Math.sin(G.frame*0.05)*6;
  ctx.save(); ctx.scale(0.65,0.65); ctx.translate(W*0.5/0.65-W/2,fy/0.65*0.35);
  drawBoss(); ctx.restore();

  let nextY=H*0.5;

  // Reprendre button (only if saved game)
  if(G.savedGame){
    const bw=230, bh=46, bx=W/2-bw/2;
    G.btns.reprendre={x:bx,y:nextY,w:bw,h:bh};
    ctx.save();
    ctx.shadowColor='#2ecc71'; ctx.shadowBlur=14;
    ctx.fillStyle='rgba(46,204,113,0.2)'; ctx.strokeStyle='#2ecc71'; ctx.lineWidth=2;
    drawRoundRect(bx,nextY,bw,bh,10); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#2ecc71'; ctx.font='bold 15px monospace'; ctx.textAlign='center';
    ctx.fillText(`▶  Reprendre  (Niv.${G.savedGame.level})`,W/2,nextY+30);
    ctx.restore();
    nextY+=58;
  } else {
    G.btns.reprendre=null;
  }

  // Difficulty label
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.font='11px monospace'; ctx.textAlign='center';
  ctx.fillText('— NOUVELLE PARTIE —',W/2,nextY-6);

  // Diff buttons
  DKEYS.forEach((k,i)=>{
    const d=DIFFS[k], y=nextY+i*56, sel=i===G.menuSel;
    ctx.save();
    if(sel){ ctx.shadowColor=d.col; ctx.shadowBlur=14; }
    ctx.fillStyle=sel?d.col+'28':'rgba(255,255,255,0.06)';
    ctx.strokeStyle=sel?d.col:'rgba(255,255,255,0.15)';
    ctx.lineWidth=sel?2:1;
    drawRoundRect(W/2-110,y,220,44,10); ctx.fill(); ctx.stroke();
    ctx.fillStyle=sel?d.col:'#888';
    ctx.font=(sel?'bold ':'')+'14px monospace'; ctx.textAlign='center';
    ctx.fillText(d.label,W/2,y+28);
    ctx.restore();
  });

  // Scores button
  const scy=nextY+DKEYS.length*56+10;
  G.btns.scores={x:W/2-100,y:scy,w:200,h:40};
  ctx.fillStyle='rgba(241,196,15,0.15)'; ctx.strokeStyle='rgba(241,196,15,0.5)'; ctx.lineWidth=1;
  drawRoundRect(W/2-100,scy,200,40,10); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#f1c40f'; ctx.font='13px monospace'; ctx.textAlign='center';
  ctx.fillText('🏆  Meilleurs Scores',W/2,scy+25);

  G.frame++;
  G.particles.forEach(p=>p.draw());
  G.particles=G.particles.filter(p=>p.life>0);
}

function drawScores(){
  ctx.save();
  ctx.shadowColor='#f1c40f'; ctx.shadowBlur=20;
  ctx.fillStyle='#f1c40f'; ctx.font='bold 22px monospace'; ctx.textAlign='center';
  ctx.fillText('🏆 MEILLEURS SCORES',W/2,H*0.14);
  ctx.restore();

  // Global best
  ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.font='11px monospace'; ctx.textAlign='center';
  ctx.fillText('RECORD ABSOLU',W/2,H*0.14+32);
  ctx.save();
  ctx.shadowColor='#f5a623'; ctx.shadowBlur=10;
  ctx.fillStyle='#f5a623'; ctx.font='bold 28px monospace'; ctx.textAlign='center';
  ctx.fillText(`${G.hi}`,W/2,H*0.14+62);
  ctx.restore();

  // Per-difficulty scores
  const startY=H*0.38;
  DKEYS.forEach((k,i)=>{
    const d=DIFFS[k], y=startY+i*72;
    ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.strokeStyle=d.col+'55'; ctx.lineWidth=1;
    drawRoundRect(W/2-130,y,260,60,10); ctx.fill(); ctx.stroke();
    ctx.fillStyle=d.col; ctx.font='bold 13px monospace'; ctx.textAlign='left';
    ctx.fillText(d.label,W/2-115,y+22);
    const sc=G.hiByDiff[k];
    ctx.fillStyle=sc>0?'#fff':'rgba(255,255,255,0.25)';
    ctx.font='bold 20px monospace'; ctx.textAlign='right';
    ctx.fillText(sc>0?sc:'---',W/2+115,y+22);
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='10px monospace'; ctx.textAlign='left';
    ctx.fillText(`x${d.mult} multiplicateur`, W/2-115,y+44);
  });

  // Back
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='12px monospace'; ctx.textAlign='center';
  ctx.fillText('← Appuie pour revenir',W/2,H-20);

  G.frame++;
}

function drawGameOver(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  drawStars();
  G.particles.forEach(p=>{ p.draw(); p.update(); });

  ctx.save();
  ctx.shadowColor='#e74c3c'; ctx.shadowBlur=40;
  ctx.fillStyle='#e74c3c'; ctx.font='bold 34px monospace'; ctx.textAlign='center';
  ctx.fillText('GAME OVER',W/2,H*0.38);
  ctx.restore();

  ctx.fillStyle='#fff'; ctx.font='16px monospace'; ctx.textAlign='center';
  ctx.fillText(`SCORE : ${G.score}`,W/2,H*0.5);
  ctx.fillText(`NIVEAU : ${G.level}`,W/2,H*0.5+30);
  ctx.fillStyle=DIFFS[G.dk].col;
  ctx.fillText(DIFFS[G.dk].label,W/2,H*0.5+60);

  if(G.score>0&&G.score>=G.hi){
    ctx.save(); ctx.fillStyle='#f1c40f'; ctx.font='bold 15px monospace';
    ctx.shadowColor='#f1c40f'; ctx.shadowBlur=20;
    ctx.fillText('🏆 NOUVEAU RECORD !',W/2,H*0.5+95);
    ctx.restore();
  }

  if(Math.floor(G.frame/25)%2===0){
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='13px monospace';
    ctx.fillText('Appuyer pour rejouer',W/2,H*0.78);
  }
  G.frame++;
}

/* ─── LOOP ─── */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
