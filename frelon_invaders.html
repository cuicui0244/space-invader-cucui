
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; }
#g {
  display: block;
  width: 100%;
  background: #000;
  position: relative;
  overflow: hidden;
  touch-action: none;
  user-select: none;
}
#score-bar {
  display: flex;
  justify-content: space-between;
  padding: 6px 12px;
  background: #000;
  color: #ff0;
  font-family: monospace;
  font-size: 14px;
}
#canvas { display: block; width: 100%; }
#ctrl {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: #000;
  gap: 8px;
}
.btn {
  background: #111;
  border: 1px solid #ff0;
  color: #ff0;
  font-family: monospace;
  font-size: 20px;
  padding: 12px 22px;
  border-radius: 8px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn:active { background: #ff0; color: #000; }
#start-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.85);
  color: #ff0;
  font-family: monospace;
  text-align: center;
  gap: 12px;
  z-index: 10;
}
#start-overlay h2 { font-size: 20px; }
#start-overlay p { font-size: 13px; color: #aaa; max-width: 260px; }
#start-btn {
  background: #ff0;
  color: #000;
  border: none;
  font-family: monospace;
  font-size: 16px;
  padding: 10px 28px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 8px;
}
</style>

<h2 class="sr-only">Frelon Invaders — jeu arcade mobile, détruisez les frelons asiatiques pour protéger vos abeilles.</h2>

<div id="g">
  <div id="score-bar">
    <span>SCORE: <span id="sc">0</span></span>
    <span>VIES: <span id="lv">❤❤❤</span></span>
    <span>VAGUE: <span id="wv">1</span></span>
  </div>
  <canvas id="canvas"></canvas>
  <div id="ctrl">
    <button class="btn" id="bl">◀</button>
    <button class="btn" id="fire">🐝 FEU</button>
    <button class="btn" id="br">▶</button>
  </div>
  <div id="start-overlay">
    <h2>🐝 FRELON INVADERS 🐝</h2>
    <p>Protège tes ruches ! Abats les frelons asiatiques avant qu'ils attaquent.</p>
    <p style="color:#ff0; font-size:12px;">Touches : ← → Espace | Mobile : boutons</p>
    <button id="start-btn">COMMENCER</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scEl = document.getElementById('sc');
const lvEl = document.getElementById('lv');
const wvEl = document.getElementById('wv');
const overlay = document.getElementById('start-overlay');

const W = 380, H = 300;
canvas.width = W; canvas.height = H;

const COLS = 8, ROWS = 3;
const INVADER_W = 28, INVADER_H = 22;
const SHIP_W = 32, SHIP_H = 18;

let score = 0, lives = 3, wave = 1;
let ship = { x: W/2 - SHIP_W/2, y: H - SHIP_H - 8, speed: 5 };
let bullets = [], ebullets = [];
let invaders = [];
let inv_dx = 1.2, inv_dy = 0;
let eShootTimer = 0, eShootInterval = 80;
let running = false, gameOver = false, won = false;
let keys = {};
let leftDown = false, rightDown = false;
let lastTime = 0;
let particles = [];

function makeInvaders() {
  invaders = [];
  const startX = 14, startY = 22;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      invaders.push({
        x: startX + c * (INVADER_W + 6),
        y: startY + r * (INVADER_H + 8),
        alive: true,
        row: r
      });
    }
  }
}

function drawInvader(x, y, row, frame) {
  const cx = x + INVADER_W/2, cy = y + INVADER_H/2;
  ctx.save();
  ctx.translate(cx, cy);

  const colors = ['#ff6600','#ff4400','#cc2200'];
  const c = colors[row] || '#ff6600';
  ctx.fillStyle = c;

  ctx.beginPath();
  ctx.ellipse(0, 1, 11, 8, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = '#ffaa00';
  ctx.beginPath();
  ctx.arc(0, -3, 5, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = '#ff2200';
  ctx.lineWidth = 1.5;
  const wing = frame === 0 ? 1 : -1;
  ctx.beginPath();
  ctx.moveTo(-11, 1);
  ctx.lineTo(-16 + wing, -4 + wing);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(11, 1);
  ctx.lineTo(16 - wing, -4 + wing);
  ctx.stroke();

  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-3, -2, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -2, 2, 0, Math.PI*2); ctx.fill();

  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-2, 6); ctx.lineTo(-4, 11);
  ctx.moveTo(0, 7); ctx.lineTo(0, 12);
  ctx.moveTo(2, 6); ctx.lineTo(4, 11);
  ctx.stroke();

  ctx.restore();
}

function drawShip(x, y) {
  ctx.save();
  ctx.translate(x + SHIP_W/2, y + SHIP_H/2);
  ctx.fillStyle = '#ffdd00';
  ctx.beginPath();
  ctx.moveTo(0, -SHIP_H/2);
  ctx.lineTo(SHIP_W/2, SHIP_H/2);
  ctx.lineTo(-SHIP_W/2, SHIP_H/2);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#ffaa00';
  ctx.beginPath();
  ctx.arc(0, 2, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(0, 2, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function addParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color
    });
  }
}

let frame = 0, frameTimer = 0;

function update(dt) {
  frameTimer += dt;
  if (frameTimer > 500) { frame = 1 - frame; frameTimer = 0; }

  if (leftDown || keys['ArrowLeft']) ship.x = Math.max(0, ship.x - ship.speed);
  if (rightDown || keys['ArrowRight']) ship.x = Math.min(W - SHIP_W, ship.x + ship.speed);

  bullets.forEach(b => b.y -= 8);
  bullets = bullets.filter(b => b.y > 0);

  ebullets.forEach(b => { b.y += 3.5 + wave * 0.3; });
  ebullets = ebullets.filter(b => b.y < H);

  const alive = invaders.filter(i => i.alive);
  if (!alive.length) { nextWave(); return; }

  let hitWall = false;
  alive.forEach(inv => {
    inv.x += inv_dx * (0.8 + wave * 0.15);
    if (inv.x <= 0 || inv.x + INVADER_W >= W) hitWall = true;
  });
  if (hitWall) {
    inv_dx *= -1;
    alive.forEach(inv => { inv.y += 14; });
  }

  alive.forEach(inv => {
    if (inv.y + INVADER_H >= ship.y) {
      endGame(false);
    }
  });

  bullets.forEach(b => {
    invaders.forEach(inv => {
      if (!inv.alive) return;
      if (b.x > inv.x && b.x < inv.x + INVADER_W && b.y > inv.y && b.y < inv.y + INVADER_H) {
        inv.alive = false;
        b.dead = true;
        score += 10 * (inv.row + 1) * wave;
        scEl.textContent = score;
        addParticles(inv.x + INVADER_W/2, inv.y + INVADER_H/2, '#ff6600');
      }
    });
  });
  bullets = bullets.filter(b => !b.dead);

  ebullets.forEach(b => {
    if (b.x > ship.x && b.x < ship.x + SHIP_W && b.y > ship.y && b.y < ship.y + SHIP_H) {
      b.dead = true;
      addParticles(ship.x + SHIP_W/2, ship.y + SHIP_H/2, '#ffdd00');
      lives--;
      lvEl.textContent = '❤'.repeat(Math.max(0, lives));
      if (lives <= 0) endGame(false);
    }
  });
  ebullets = ebullets.filter(b => !b.dead);

  eShootTimer++;
  if (eShootTimer >= eShootInterval) {
    eShootTimer = 0;
    const col = Math.floor(Math.random() * COLS);
    let shooter = null;
    for (let r = ROWS - 1; r >= 0; r--) {
      const inv = invaders.find(i => i.alive && i.row === r && Math.floor((i.x - 14) / (INVADER_W + 6)) === col);
      if (inv) { shooter = inv; break; }
    }
    if (!shooter) {
      const al = invaders.filter(i => i.alive);
      shooter = al[Math.floor(Math.random() * al.length)];
    }
    if (shooter) ebullets.push({ x: shooter.x + INVADER_W/2, y: shooter.y + INVADER_H });
    eShootInterval = Math.max(30, 80 - wave * 8);
  }

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.life -= 0.07;
  });
  particles = particles.filter(p => p.life > 0);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  invaders.forEach(inv => {
    if (inv.alive) drawInvader(inv.x, inv.y, inv.row, frame);
  });

  drawShip(ship.x, ship.y);

  ctx.fillStyle = '#7df';
  bullets.forEach(b => {
    ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
  });

  ctx.fillStyle = '#f55';
  ebullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
    ctx.fill();
  });

  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  ctx.fillStyle = '#333';
  ctx.fillRect(0, H - 3, W, 3);
}

function loop(ts) {
  if (!running) return;
  const dt = ts - lastTime;
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function nextWave() {
  wave++;
  wvEl.textContent = wave;
  bullets = []; ebullets = [];
  makeInvaders();
  inv_dx = 1.2;
  showMsg(`VAGUE ${wave} !`, '#0f0', () => { running = true; requestAnimationFrame(loop); });
}

function endGame(win) {
  running = false;
  gameOver = true;
  const msg = win ? '🎉 VICTOIRE !' : '💀 GAME OVER';
  const sub = win ? 'Les ruches sont sauvées !' : `Score : ${score}`;
  overlay.innerHTML = `<h2 style="color:#ff0">${msg}</h2><p>${sub}</p><p style="color:#aaa;font-size:12px">Score final : ${score} — Vague ${wave}</p><button id="start-btn" style="background:#ff0;color:#000;border:none;font-family:monospace;font-size:16px;padding:10px 28px;border-radius:8px;cursor:pointer;margin-top:8px">REJOUER</button>`;
  overlay.style.display = 'flex';
  document.getElementById('start-btn').addEventListener('click', startGame);
}

function showMsg(text, color, cb) {
  running = false;
  overlay.innerHTML = `<h2 style="color:${color};font-size:26px">${text}</h2>`;
  overlay.style.display = 'flex';
  setTimeout(() => {
    overlay.style.display = 'none';
    cb();
  }, 1200);
}

function startGame() {
  score = 0; lives = 3; wave = 1;
  scEl.textContent = 0;
  lvEl.textContent = '❤❤❤';
  wvEl.textContent = 1;
  bullets = []; ebullets = []; particles = [];
  ship.x = W/2 - SHIP_W/2;
  inv_dx = 1.2;
  makeInvaders();
  gameOver = false;
  overlay.style.display = 'none';
  running = true;
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function shoot() {
  if (!running) return;
  if (bullets.length < 3) {
    bullets.push({ x: ship.x + SHIP_W/2, y: ship.y });
  }
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('bl').addEventListener('pointerdown', () => leftDown = true);
document.getElementById('bl').addEventListener('pointerup', () => leftDown = false);
document.getElementById('br').addEventListener('pointerdown', () => rightDown = true);
document.getElementById('br').addEventListener('pointerup', () => rightDown = false);
document.getElementById('fire').addEventListener('pointerdown', shoot);

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); shoot(); }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
</script>
